<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG </title>

<style>
body {
    font-family: Arial;
    background: #49025f;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.container {
    width: 700px;
}

h1 {
    text-align: center;
}

.upload-box {
    border: 2px dashed #e7acf0;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    border-radius: 10px;
    margin-bottom: 20px;
}

.upload-box:hover {
    background: #111a2f;
}

.chat-box {
    background: #de9ae9;
    height: 400px;
    overflow-y: auto;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.message {
    margin-bottom: 10px;
}

.user {
    color: #35033e;
}

.bot {
    color: #43034f;
}

.input-area {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    margin-left: 10px;
    background: #9908ed;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

#status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1> ASK ME ANYTHING </h1>

    <!-- Upload -->
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        Click to Upload PDF
    </div>
    <input type="file" id="fileInput" hidden />

    <div id="status"></div>

    <!-- Chat -->
    <div class="chat-box" id="chatBox"></div>

    <!-- Input -->
    <div class="input-area">
        <input type="text" id="question" placeholder="Ask something..." />
        <button onclick="askQuestion()">Send</button>
    </div>
</div>

<script>
let ready = false;

// =========================
// 📤 UPLOAD PDF
// =========================
document.getElementById("fileInput").onchange = async () => {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("status").innerText = "Uploading PDF... ⏳";

    try {
        const res = await fetch("http://127.0.0.1:8000/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        console.log(data);

        if (!res.ok || data.error) {
            throw new Error(data.error || "Upload failed");
        }

        document.getElementById("status").innerText =
            `✅ PDF uploaded (${data.chunks} chunks)`;

        ready = true;

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText =
            "❌ Upload failed: " + err.message;
    }
};

// =========================
// ❓ ASK QUESTION
// =========================
async function askQuestion() {
    const questionInput = document.getElementById("question");
    const chatBox = document.getElementById("chatBox");

    const question = questionInput.value.trim();
    if (!question) return;

    if (!ready) {
        alert("Upload PDF first!");
        return;
    }

    // Show user message
    chatBox.innerHTML += `<div class="message user">You: ${question}</div>`;
    questionInput.value = "";

    try {
        const res = await fetch("http://127.0.0.1:8000/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question })
        });

        const data = await res.json();
        console.log(data);

        if (data.error) {
            throw new Error(data.error);
        }

        // Show answer
        let sourcesHTML = data.sources.map(s =>
            `Page ${s.page}: ${s.text}...`
        ).join("<br>");

        chatBox.innerHTML += `
            <div class="message bot">
                Answer: ${data.answer} <br><br>
                <small>${sourcesHTML}</small>
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        console.error(err);
        chatBox.innerHTML += `<div class="message bot">❌ Error: ${err.message}</div>`;
    }
}
</script>

</body>
</html>
